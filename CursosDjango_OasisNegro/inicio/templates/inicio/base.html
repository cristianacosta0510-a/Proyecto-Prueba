{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Smart City XR{% endblock %}</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Minimalistas -->
    <link rel="stylesheet" href="{% static 'inicio/css/estilos.css' %}?v=8">
</head>

<body>
    <header class="main-header">
        <div class="container">
            <nav>
                <div class="logo">
                    <i class="fas fa-layer-group text-blue"></i> Smart City XR
                </div>
                <ul class="nav-links">
                    <li><a href="{% url 'nosotros' %}">Nosotros</a></li>
                    <li><a href="{% url 'servicios' %}">Servicios</a></li>
                    <li><a href="{% url 'blog' %}">Blog</a></li>
                    <li><a href="{% url 'contacto' %}">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    {% block contenido %}
    {% endblock %}

    <!-- Footer -->
    <footer>
        <div class="container" style="color: var(--text-muted);">
            &copy; 2026 Smart City XR. Todos los derechos reservados.
        </div>
    </footer>

    <!-- Interacciones DOM Suaves -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = 1;
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, { threshold: 0.05 });

            const animElements = document.querySelectorAll('.feature-card, .catalog-item, .glass-panel');
            animElements.forEach(el => {
                el.style.opacity = 0;
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s ease-out';
                observer.observe(el);
            });
        });
    </script>
</body>

</html>
